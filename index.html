<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">

    <title>Gizem Ece</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        .container {
            margin-top: 20vh;
        }
        h1 {
            font-size: 24px;
            color: #333;
            margin: 0;
        }
        p {
            font-size: 16px;
            color: #555;
            margin: 10px 0;
        }
        iframe {
            margin-top: 20px;
            border: none;
        }
        .social-media {

        }
        .social-media a {
            display: block;
            color: #0073b1; /* LinkedIn blue as base color */

            margin: 5px 0;

        }
        .social-media a:hover {
            text-decoration: underline;
        }

        <h1>Kendime bir web sitesi oluşturuyorum.</h1>
        <p>Canlıya alana kadar böyle kalsın.</p>
    </div>
    <iframe 
        width="560" 
        height="315" 
        src="https://www.youtube.com/embed/UEY2Yvt1NTE" 
        title="YouTube video player" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
        allowfullscreen>
    </iframe>
    <div class="social-media">
        <a href="https://linkedin.com/in/geceavsar" target="_blank">LinkedIn: linkedin.com/in/geceavsar</a>
        <a href="https://github.com/geceavsar" target="_blank">GitHub: github.com/geceavsar</a>
